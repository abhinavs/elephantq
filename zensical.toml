[project]
site_name = "Soniq"
site_url = "https://soniq.dev/docs/"
site_description = "Background jobs for Python. Powered by the Postgres you already have."
site_author = "Abhinav Saxena"
docs_dir = "docs"
site_dir = "site"
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Quickstart" = "getting-started/quickstart.md" },
    { "Installation" = "getting-started/installation.md" },
  ] },
  { "Concepts" = [
    { "Jobs" = "concepts/jobs.md" },
    { "Queues" = "concepts/queues.md" },
    { "Workers" = "concepts/workers.md" },
    { "Retries" = "concepts/retries.md" },
    { "Scheduling" = "concepts/scheduling.md" },
    { "Dead-letter queue" = "concepts/dead-letter.md" },
  ] },
  { "Guides" = [
    { "FastAPI" = "guides/fastapi.md" },
    { "Transactional enqueue" = "guides/transactional-enqueue.md" },
    { "Common patterns" = "guides/common-patterns.md" },
    { "Testing" = "guides/testing.md" },
  ] },
  { "API Reference" = [
    { "Soniq" = "api/soniq.md" },
    { "Jobs" = "api/jobs.md" },
    { "Worker" = "api/worker.md" },
    { "Hooks" = "api/hooks.md" },
  ] },
  { "CLI" = "cli/commands.md" },
  { "Dashboard" = "dashboard/overview.md" },
  { "Production" = [
    { "Checklist" = "production/checklist.md" },
    { "PostgreSQL tuning" = "production/postgres.md" },
    { "Deployment" = "production/deployment.md" },
    { "Reliability" = "production/reliability.md" },
  ] },
  { "Recipes" = [
    { "Email jobs" = "recipes/email-jobs.md" },
    { "File processing" = "recipes/file-processing.md" },
    { "Scheduled reports" = "recipes/scheduled-reports.md" },
    { "Webhook delivery" = "recipes/webhook-delivery.md" },
  ] },
]

[project.theme]
variant = "modern"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
