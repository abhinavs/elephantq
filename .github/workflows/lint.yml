name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard,monitoring]"
          pip install mypy

      - name: Check formatting with black
        run: black --check .

      - name: Check import order with isort
        run: isort --check-only .

      - name: Lint with flake8
        run: flake8 elephantq/ tests/

      - name: Type check with mypy
        run: mypy elephantq/ --ignore-missing-imports

      - name: Check for dead documentation URLs
        run: |
          if grep -r "docs\.elephantq\.dev" elephantq/ examples/ docs/; then
            echo "ERROR: Found references to non-existent docs.elephantq.dev"
            exit 1
          fi
